function filtrarPorZonaMapa(nivel, zona) {
  if (nivel === 'departamento') { FILTROS.departamento = zona; FILTROS.provincia = ''; FILTROS.distrito = ''; }
  else if (nivel === 'provincia') { FILTROS.provincia = zona; FILTROS.distrito = ''; }
  else if (nivel === 'distrito') { FILTROS.distrito = zona; }
  renderFiltros();
  renderContent();
}

function agruparGeo(data, campo) {
  var map = {};
  data.forEach(function(r){
    var k = r[campo] || 'Sin definir';
    if(!map[k]) map[k] = {vis:{}, cv:0, sv:0, ext:0, tot:0};
    map[k].vis[r.id] = true;
    if(r.modo === 'SI') { map[k].cv++; map[k].tot += r.total||0; }
    else {
      map[k].sv++;
      if(CAUSALES_INFO[r.causal] && CAUSALES_INFO[r.causal].tipo === 'externa') map[k].ext++;
    }
  });
  Object.keys(map).forEach(function(k){
    var d = map[k];
    d.vis = Object.keys(d.vis).length;
    // CV y SV cuentan filas, no visitas únicas — corrijo a visitas
    d.neto = d.vis - d.ext;
    d.ef = d.neto > 0 ? Math.round(d.cv/d.neto*100) : 0;
  });
  return map;
}

function renderTablaGeo(map, lbl) {
  var arr = Object.keys(map).map(function(k){return Object.assign({nm:k}, map[k]);});
  arr.sort(function(a,b){return b.tot - a.tot;});

  if (arr.length === 0) return '<div class="empty">Sin datos</div>';

  var html = '<table class="tbl"><thead><tr>';
  html += '<th>'+lbl+'</th><th class="r">Visitas</th><th class="r">C/Venta</th><th class="r">Efect.</th><th class="r">Total S/</th>';
  html += '</tr></thead><tbody>';
  arr.forEach(function(d){
    var efCol = d.ef>=65?'var(--green)':(d.ef>=50?'var(--amber)':'var(--red)');
    html += '<tr>';
    html += '<td><strong>'+d.nm+'</strong></td>';
    html += '<td class="r num">'+d.vis+'</td>';
    html += '<td class="r num" style="color:var(--green)">'+d.cv+'</td>';
    html += '<td class="r num" style="color:'+efCol+'"><strong>'+d.ef+'%</strong></td>';
    html += '<td class="r num"><strong>S/ '+fmt(d.tot)+'</strong></td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

// ANÁLISIS EJECUTIVO GEOGRÁFICO (con planes de acción)
// ════════════════════════════════════════════════════════
function renderAnalisisEjecutivoGeo(data, depMap, provMap, distMap) {
  var html = '<div class="sec">';
  html += '<div class="sec-hdr">';
  html += '<div class="sec-ttl"><div class="sec-ttl-ico">🎯</div>Análisis ejecutivo y plan de acción</div>';
  html += '<div style="font-size:11px;color:var(--t2)">Se actualiza según los filtros aplicados</div>';
  html += '</div>';

  // Caso 1: Filtro de distrito específico
  if (FILTROS.distrito && distMap[FILTROS.distrito]) {
    html += renderAnalisisZona(FILTROS.distrito, distMap[FILTROS.distrito], data, 'distrito');
  }
  // Caso 2: Filtro de provincia
  else if (FILTROS.provincia && provMap[FILTROS.provincia]) {
    html += renderAnalisisZona(FILTROS.provincia, provMap[FILTROS.provincia], data, 'provincia');
    // + Top 3 distritos de esa provincia
    var distInProv = {};
    data.forEach(function(r){
      if (r.provincia === FILTROS.provincia) {
        if (!distInProv[r.distrito]) distInProv[r.distrito] = {tot:0, vis:{}};
        distInProv[r.distrito].vis[r.id] = true;
        if (r.modo === 'SI') distInProv[r.distrito].tot += r.total||0;
      }
    });
    var topDist = Object.keys(distInProv).map(function(k){return {nm:k, tot:distInProv[k].tot, vis:Object.keys(distInProv[k].vis).length};}).sort(function(a,b){return b.tot - a.tot;}).slice(0,3);
    if (topDist.length > 0) {
      html += '<div style="background:var(--blue-l);border-radius:10px;padding:12px 14px;margin-top:12px">';
      html += '<div style="font-size:11px;font-weight:700;color:var(--blue-d);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">📍 TOP DISTRITOS EN '+FILTROS.provincia+'</div>';
      topDist.forEach(function(t,i){
        html += '<div style="font-size:13px;color:var(--blue-d);margin-bottom:4px">'+(i+1)+'. <strong>'+t.nm+'</strong> · S/ '+fmt(t.tot)+' ('+t.vis+' visitas)</div>';
      });
      html += '</div>';
    }
  }
  // Caso 3: Filtro de departamento
  else if (FILTROS.departamento && depMap[FILTROS.departamento]) {
    html += renderAnalisisZona(FILTROS.departamento, depMap[FILTROS.departamento], data, 'departamento');
    // + Distribución por provincia
    var provInDep = {};
    data.forEach(function(r){
      if (r.departamento === FILTROS.departamento) {
        if (!provInDep[r.provincia]) provInDep[r.provincia] = {tot:0, vis:{}};
        provInDep[r.provincia].vis[r.id] = true;
        if (r.modo === 'SI') provInDep[r.provincia].tot += r.total||0;
      }
    });
    var topProv = Object.keys(provInDep).map(function(k){return {nm:k, tot:provInDep[k].tot, vis:Object.keys(provInDep[k].vis).length};}).sort(function(a,b){return b.tot - a.tot;}).slice(0,5);
    if (topProv.length > 0) {
      html += '<div style="background:var(--blue-l);border-radius:10px;padding:12px 14px;margin-top:12px">';
      html += '<div style="font-size:11px;font-weight:700;color:var(--blue-d);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">🏞️ PROVINCIAS DE '+FILTROS.departamento+'</div>';
      topProv.forEach(function(t,i){
        html += '<div style="font-size:13px;color:var(--blue-d);margin-bottom:4px">'+(i+1)+'. <strong>'+t.nm+'</strong> · S/ '+fmt(t.tot)+' ('+t.vis+' visitas)</div>';
      });
      html += '</div>';
    }
  }
  // Caso 4: Sin filtros geográficos → vista nacional
  else {
    html += renderAnalisisNacional(depMap, data);
  }

  html += '</div>';
  return html;
}

function renderAnalisisZona(zona, datos, dataFull, nivel) {
  // Subset de data relacionada con esta zona
  var dataZona;
  if (nivel === 'distrito') dataZona = dataFull.filter(function(r){return r.distrito === zona;});
  else if (nivel === 'provincia') dataZona = dataFull.filter(function(r){return r.provincia === zona;});
  else dataZona = dataFull.filter(function(r){return r.departamento === zona;});

  // Causal top
  var causalCount = {};
  dataZona.forEach(function(r){ if(r.modo==='NO'&&r.causal) causalCount[r.causal] = (causalCount[r.causal]||0)+1; });
  var causalTop = Object.keys(causalCount).sort(function(a,b){return causalCount[b]-causalCount[a];})[0];

  // SKU top
  var skuCount = {};
  dataZona.forEach(function(r){
    if (r.modo === 'SI' && r.pedido) r.pedido.forEach(function(p){
      if (!skuCount[p.nm]) skuCount[p.nm] = {qty:0, tot:0};
      skuCount[p.nm].qty += p.qty||0;
      skuCount[p.nm].tot += (p.qty||0)*(p.price||0);
    });
  });
  var skuArr = Object.keys(skuCount).map(function(k){return {nm:k, qty:skuCount[k].qty, tot:skuCount[k].tot};}).sort(function(a,b){return b.tot - a.tot;});
  var skuTop = skuArr[0];

  // Promotoras activas
  var promsAct = {};
  dataZona.forEach(function(r){ promsAct[r.usuario] = true; });
  var nProms = Object.keys(promsAct).length;

  // Comentario ejecutivo dinámico
  var nivelLbl = nivel === 'departamento' ? 'el departamento' : (nivel === 'provincia' ? 'la provincia' : 'el distrito');
  var efTexto = datos.ef >= 65 ? 'sobresaliente' : (datos.ef >= 50 ? 'aceptable' : 'baja');
  var efColor = datos.ef >= 65 ? 'var(--green)' : (datos.ef >= 50 ? 'var(--amber)' : 'var(--red)');

  var html = '<div style="background:linear-gradient(135deg,var(--purple-l),#F5F3FF);border-left:4px solid var(--purple);border-radius:12px;padding:16px 18px">';
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
  html += '<span style="font-size:20px">📊</span>';
  html += '<div style="font-size:13px;font-weight:700;color:#5B21B6;text-transform:uppercase;letter-spacing:.5px">LECTURA EJECUTIVA · '+zona+'</div>';
  html += '</div>';

  // Resumen narrativo
  html += '<div style="font-size:13.5px;color:#4C1D95;line-height:1.7;margin-bottom:12px">';
  html += 'En '+nivelLbl+' <strong>'+zona+'</strong> se registraron <strong>'+datos.vis+' visitas</strong> generando <strong>S/ '+fmt(datos.tot)+'</strong> en ventas con una efectividad <strong style="color:'+efColor+'">'+efTexto+' del '+datos.ef+'%</strong>. ';
  if (nProms > 0) html += 'Participaron <strong>'+nProms+' promotora(s)</strong> en la zona. ';
  if (skuTop) html += 'El SKU líder es <strong>'+skuTop.nm+'</strong> con '+skuTop.qty+' UND vendidas. ';
  if (causalTop) html += 'La principal barrera fue <strong>'+causalTop+'</strong> ('+causalCount[causalTop]+' veces).';
  html += '</div>';

  // Inputs / Observaciones detectados
  html += '<div style="background:rgba(255,255,255,.7);border-radius:8px;padding:11px 13px;margin-bottom:12px">';
  html += '<div style="font-size:10px;font-weight:700;color:#5B21B6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">📥 INPUTS DETECTADOS</div>';
  html += '<ul style="margin:0;padding-left:18px;font-size:12.5px;color:#4C1D95;line-height:1.7">';

  if (datos.tot === 0 && datos.vis > 0) html += '<li><strong>Ventas en cero:</strong> '+datos.vis+' visita(s) sin generar pedido. Revisar urgentemente la operación en la zona.</li>';
  if (datos.ef < 40 && datos.vis > 3) html += '<li><strong>Efectividad crítica</strong> ('+datos.ef+'%): la conversión es menor a 4 de cada 10 visitas. Acompañamiento del supervisor recomendado.</li>';
  if (datos.ext > datos.vis * 0.4) html += '<li><strong>Alto porcentaje de causales externas</strong> ('+datos.ext+' de '+datos.vis+'): muchos PDVs cerrados o sin dueño. Revisar horarios de visita.</li>';
  if (causalTop && CAUSALES_INFO[causalTop] && CAUSALES_INFO[causalTop].tipo === 'interna') {
    html += '<li><strong>Causa interna recurrente:</strong> "'+causalTop+'" requiere acción comercial específica.</li>';
  }
  if (skuArr.length === 1 && datos.cv > 3) html += '<li><strong>Concentración en 1 solo SKU:</strong> oportunidad para diversificar el mix vendido en la zona.</li>';
  if (skuArr.length >= 4) html += '<li><strong>Buen mix de productos:</strong> '+skuArr.length+' SKUs activados — replicar estrategia en otras zonas.</li>';
  if (nProms === 1 && datos.vis > 8) html += '<li><strong>Una sola promotora cubre la zona:</strong> evaluar carga de trabajo.</li>';

  html += '</ul></div>';

  // Plan de acción
  html += '<div style="background:rgba(255,255,255,.85);border-radius:8px;padding:11px 13px;border:1.5px dashed var(--purple)">';
  html += '<div style="font-size:10px;font-weight:700;color:#5B21B6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">🎯 PLAN DE ACCIÓN SUGERIDO</div>';
  html += '<ol style="margin:0;padding-left:18px;font-size:12.5px;color:#4C1D95;line-height:1.7">';

  // Acciones según contexto
  if (datos.ef < 50) {
    html += '<li><strong>Acompañamiento en ruta:</strong> el supervisor debe acompañar 1 día completo a la(s) promotora(s) de la zona para identificar barreras operativas reales.</li>';
  }
  if (causalTop === 'AUN TIENE STOCK / BAJA ROTACION') {
    html += '<li><strong>Plan de rotación:</strong> coordinar promoción específica con distribuidor para los PDVs con stock acumulado. Considerar 2x1 o rebate al canal.</li>';
  }
  if (causalTop === 'RECHAZO POR PRECIO') {
    html += '<li><strong>Revisar precio listado:</strong> validar competencia identificada y evaluar promoción táctica de 2 semanas.</li>';
  }
  if (causalTop === 'DISTRIBUIDORA SIN STOCK') {
    html += '<li><strong>Reposición urgente:</strong> escalar al área comercial los SKUs faltantes — son ventas perdidas medibles.</li>';
  }
  if (causalTop === 'RECHAZO POR BAJO MARGEN DE GANANCIA') {
    html += '<li><strong>Negociar margen extra:</strong> coordinar con distribuidor el cierre de brecha entre precio compra y sugerido de venta.</li>';
  }
  if (datos.vis > 0 && skuArr.length < 3) {
    html += '<li><strong>Diversificar oferta:</strong> introducir gradualmente 2-3 SKUs adicionales del portafolio Kenvue por visita.</li>';
  }
  if (datos.tot >= 1000) {
    html += '<li><strong>Replicar buenas prácticas:</strong> esta zona genera buen volumen — documentar la rutina exitosa para replicar en zonas de menor performance.</li>';
  }
  // Acción por defecto si no se cumple ninguna
  html += '<li><strong>Seguimiento semanal:</strong> revisar evolución de KPIs y comparar contra semanas anteriores para detectar tendencias.</li>';

  html += '</ol></div>';
  html += '</div>';

  return html;
}

function renderAnalisisNacional(depMap, dataFull) {
  // Identificar oportunidades a nivel nacional
  var deps = Object.keys(depMap).map(function(k){return Object.assign({nm:k}, depMap[k]);});
  deps.sort(function(a,b){return b.tot - a.tot;});

  if (deps.length === 0) {
    return '<div class="empty">Sin datos para analizar. Aplica filtros o revisa la fecha seleccionada.</div>';
  }

  var topDep = deps[0];
  var worstDep = deps.filter(function(d){return d.vis > 0;}).sort(function(a,b){return a.ef - b.ef;})[0];
  var totalNacional = deps.reduce(function(a,d){return a+d.tot;},0);
  var pctTop = totalNacional > 0 ? Math.round(topDep.tot / totalNacional * 100) : 0;

  // Causal nacional dominante
  var causalCount = {};
  dataFull.forEach(function(r){ if(r.modo==='NO'&&r.causal) causalCount[r.causal] = (causalCount[r.causal]||0)+1; });
  var causalTop = Object.keys(causalCount).sort(function(a,b){return causalCount[b]-causalCount[a];})[0];

  var html = '<div style="background:linear-gradient(135deg,var(--purple-l),#F5F3FF);border-left:4px solid var(--purple);border-radius:12px;padding:16px 18px">';
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
  html += '<span style="font-size:20px">🇵🇪</span>';
  html += '<div style="font-size:13px;font-weight:700;color:#5B21B6;text-transform:uppercase;letter-spacing:.5px">LECTURA EJECUTIVA NACIONAL</div>';
  html += '</div>';

  html += '<div style="font-size:13.5px;color:#4C1D95;line-height:1.7;margin-bottom:12px">';
  html += 'A nivel nacional, <strong>'+topDep.nm+'</strong> lidera con <strong>S/ '+fmt(topDep.tot)+'</strong> ('+pctTop+'% del total). ';
  if (worstDep && worstDep.nm !== topDep.nm) html += '<strong>'+worstDep.nm+'</strong> presenta la efectividad más baja ('+worstDep.ef+'%) y requiere atención. ';
  if (causalTop) html += 'La causal predominante en el país es <strong>'+causalTop+'</strong> ('+causalCount[causalTop]+' incidencias).';
  html += '</div>';

  // Top vs Bottom
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">';
  // Top
  html += '<div style="background:var(--green-l);border-radius:8px;padding:11px 13px">';
  html += '<div style="font-size:10px;font-weight:700;color:#065F46;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">🏆 ZONA DESTACADA</div>';
  html += '<div style="font-size:14px;font-weight:700;color:#065F46">'+topDep.nm+'</div>';
  html += '<div style="font-size:11px;color:#047857;margin-top:3px">S/ '+fmt(topDep.tot)+' · '+topDep.vis+' visitas · '+topDep.ef+'%</div>';
  html += '</div>';
  // Worst
  if (worstDep) {
    html += '<div style="background:var(--red-l);border-radius:8px;padding:11px 13px">';
    html += '<div style="font-size:10px;font-weight:700;color:#991B1B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">⚠ ZONA CRÍTICA</div>';
    html += '<div style="font-size:14px;font-weight:700;color:#991B1B">'+worstDep.nm+'</div>';
    html += '<div style="font-size:11px;color:#7F1D1D;margin-top:3px">S/ '+fmt(worstDep.tot)+' · '+worstDep.vis+' visitas · '+worstDep.ef+'%</div>';
    html += '</div>';
  }
  html += '</div>';

  // Inputs nacionales
  html += '<div style="background:rgba(255,255,255,.7);border-radius:8px;padding:11px 13px;margin-bottom:12px">';
  html += '<div style="font-size:10px;font-weight:700;color:#5B21B6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">📥 INPUTS NACIONALES</div>';
  html += '<ul style="margin:0;padding-left:18px;font-size:12.5px;color:#4C1D95;line-height:1.7">';

  var noVendidos = deps.filter(function(d){return d.vis === 0;}).length;
  if (noVendidos > 0) html += '<li><strong>'+noVendidos+' departamento(s) sin actividad</strong> en el día seleccionado.</li>';
  if (pctTop >= 50) html += '<li><strong>Concentración alta:</strong> '+topDep.nm+' representa el '+pctTop+'% del total. Riesgo de dependencia geográfica.</li>';
  if (deps.length >= 5) html += '<li><strong>Buena diversificación geográfica:</strong> '+deps.length+' departamentos activos.</li>';
  if (causalTop && CAUSALES_INFO[causalTop] && CAUSALES_INFO[causalTop].tipo === 'interna') {
    html += '<li><strong>Causal interna nacional:</strong> "'+causalTop+'" se repite — coordinación con área comercial y trade marketing.</li>';
  }
  // Promedio efectividad
  var efProm = Math.round(deps.reduce(function(a,d){return a + d.ef;}, 0) / deps.length);
  html += '<li><strong>Efectividad promedio nacional:</strong> '+efProm+'%' + (efProm >= 60 ? ' (sobre meta)' : ' (bajo meta de 60%)') + '.</li>';

  html += '</ul></div>';

  // Plan de acción nacional
  html += '<div style="background:rgba(255,255,255,.85);border-radius:8px;padding:11px 13px;border:1.5px dashed var(--purple)">';
  html += '<div style="font-size:10px;font-weight:700;color:#5B21B6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">🎯 PLAN DE ACCIÓN ESTRATÉGICO</div>';
  html += '<ol style="margin:0;padding-left:18px;font-size:12.5px;color:#4C1D95;line-height:1.7">';

  if (worstDep && worstDep.ef < 50) html += '<li><strong>Foco en '+worstDep.nm+':</strong> reunión con supervisor a cargo para revisar plan de recuperación a 30 días.</li>';
  if (causalTop && CAUSALES_INFO[causalTop] && CAUSALES_INFO[causalTop].tipo === 'interna') {
    html += '<li><strong>Plan ejecutivo sobre "'+causalTop+'":</strong> coordinar con comercial y trade marketing acciones a nivel nacional.</li>';
  }
  if (pctTop >= 50) html += '<li><strong>Diversificación geográfica:</strong> definir 1-2 zonas secundarias para aumentar volumen y reducir dependencia.</li>';
  html += '<li><strong>Replicar buenas prácticas de '+topDep.nm+':</strong> documentar y compartir con los demás supervisores.</li>';
  html += '<li><strong>Comité semanal con supervisores:</strong> revisar evolución de KPIs y validar planes de cada zona.</li>';

  html += '</ol></div>';
  html += '</div>';

  return html;
}

function renderSkusPorGeo(data) {
  // SKUs vendidos por departamento
  var skuPorDep = {};
  data.forEach(function(r){
    if(r.modo!=='SI'||!r.pedido) return;
    var d = r.departamento || 'Sin definir';
    if(!skuPorDep[d]) skuPorDep[d] = {};
    r.pedido.forEach(function(p){
      if(!skuPorDep[d][p.nm]) skuPorDep[d][p.nm] = {qty:0, tot:0};
      skuPorDep[d][p.nm].qty += p.qty||0;
      skuPorDep[d][p.nm].tot += (p.qty||0)*(p.price||0);
    });
  });

  var html = '<div class="sec">';
  html += '<div class="sec-hdr"><div class="sec-ttl"><div class="sec-ttl-ico">📦</div>Movimiento de SKUs por Departamento</div></div>';

  var deps = Object.keys(skuPorDep);
  if (deps.length === 0) {
    html += '<div class="empty">Sin ventas registradas en esta selección</div>';
    html += '</div>';
    return html;
  }

  deps.forEach(function(dep){
    var skus = Object.keys(skuPorDep[dep]).map(function(s){return Object.assign({nm:s}, skuPorDep[dep][s]);});
    skus.sort(function(a,b){return b.tot - a.tot;});

    html += '<div style="margin-bottom:18px;padding:12px;background:var(--bg);border-radius:10px">';
    html += '<p style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--blue-d)">📍 '+dep+'</p>';
    html += '<table class="tbl" style="font-size:11px;background:#fff;border-radius:8px;overflow:hidden">';
    html += '<thead><tr><th style="font-size:10px">SKU</th><th class="r" style="font-size:10px">UND</th><th class="r" style="font-size:10px">Total S/</th></tr></thead><tbody>';
    skus.slice(0,6).forEach(function(s){
      html += '<tr><td>'+s.nm+'</td><td class="r num">'+s.qty+'</td><td class="r num"><strong>S/ '+fmt(s.tot)+'</strong></td></tr>';
    });
    html += '</tbody></table>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function renderConclusiones() {
  var data = dataFiltrada();
  var m = calcMetricas(data);

  var concPos = [], concNeg = [], concAcc = [];

  if (m.ef >= 60) concPos.push('Efectividad por encima del objetivo: <strong>'+m.ef+'%</strong> (meta: 60%).');
  if (m.ef < 50 && m.vis > 5) concNeg.push('Efectividad por debajo de objetivo: <strong>'+m.ef+'%</strong> (meta: 60%).');
  if (m.skusAct >= 6) concPos.push('Diversidad de SKUs activados: <strong>'+m.skusAct+'</strong> productos en venta.');
  if (m.tot > 3000) concPos.push('Excelente nivel de ventas: <strong>S/ '+fmt(m.tot)+'</strong>.');

  // Promotoras sin iniciar
  var proms = SESION.role==='jefe' ? TODOS_PROMS : (SUP_MAP[SESION.user]||[]);
  var sinIni = [];
  proms.forEach(function(p){ var pm = metricasPromotora(data, p); if(pm.vis===0) sinIni.push(p); });
  if (sinIni.length > 0) concAcc.push('Contactar a <strong>'+sinIni.join(', ')+'</strong> — sin registros del día.');

  // Causal interna top
  var causalCount = {};
  data.forEach(function(r){if(r.modo==='NO'&&r.causal&&CAUSALES_INFO[r.causal]&&CAUSALES_INFO[r.causal].tipo==='interna')causalCount[r.causal]=(causalCount[r.causal]||0)+1;});
  var causalTop = Object.keys(causalCount).sort(function(a,b){return causalCount[b]-causalCount[a];})[0];
  if (causalTop) concAcc.push('Causa interna recurrente: <strong>'+causalTop+'</strong> ('+causalCount[causalTop]+' veces) — accionar con distribuidor y comercial.');

  var savedNotes = localStorage.getItem('dash_notes_'+SESION.user+'_'+FECHA) || '';

  var html = '<div class="sec">';
  html += '<div class="sec-hdr"><div class="sec-ttl"><div class="sec-ttl-ico">📝</div>Conclusiones automáticas del día</div></div>';

  if (concPos.length > 0) {
    html += '<div style="background:var(--green-l);border-left:3px solid var(--green);border-radius:10px;padding:12px 14px;margin-bottom:10px">';
    html += '<div style="font-size:11px;font-weight:700;color:#065F46;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">✅ ASPECTOS POSITIVOS</div>';
    html += '<ul style="margin:0;padding-left:18px;font-size:13px;color:#065F46;line-height:1.7">';
    concPos.forEach(function(p){html+='<li>'+p+'</li>';});
    html += '</ul></div>';
  }
  if (concNeg.length > 0) {
    html += '<div style="background:var(--red-l);border-left:3px solid var(--red);border-radius:10px;padding:12px 14px;margin-bottom:10px">';
    html += '<div style="font-size:11px;font-weight:700;color:#991B1B;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">⚠ ASPECTOS A MEJORAR</div>';
    html += '<ul style="margin:0;padding-left:18px;font-size:13px;color:#991B1B;line-height:1.7">';
    concNeg.forEach(function(p){html+='<li>'+p+'</li>';});
    html += '</ul></div>';
  }
  if (concAcc.length > 0) {
    html += '<div style="background:var(--amber-l);border-left:3px solid var(--amber);border-radius:10px;padding:12px 14px">';
    html += '<div style="font-size:11px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">🎯 ACCIONES SUGERIDAS</div>';
    html += '<ul style="margin:0;padding-left:18px;font-size:13px;color:#92400E;line-height:1.7">';
    concAcc.forEach(function(p){html+='<li>'+p+'</li>';});
    html += '</ul></div>';
  }
  html += '</div>';

  html += '<div class="sec">';
  html += '<div class="sec-hdr"><div class="sec-ttl"><div class="sec-ttl-ico">💬</div>Comentarios ejecutivos · '+SESION.nombre+'</div></div>';
  html += '<p style="font-size:12px;color:var(--t2);margin-bottom:10px">Anota observaciones del día. Se guarda localmente; en producción se enviará al Google Sheets.</p>';
  html += '<textarea id="com-txt" class="com-textarea" placeholder="Ej: PROMLIM6 reportó problema con la moto. Coordinación pendiente con DIJISA por stock de Neko 75gr...">'+savedNotes+'</textarea>';
  html += '<button class="btn-save" onclick="guardarComentario()">💾 Guardar comentarios</button>';
  html += '<div id="com-saved" style="display:none;margin-top:8px;font-size:11px;color:var(--green)">✓ Comentarios guardados</div>';
  html += '</div>';

  document.getElementById('content').innerHTML = html;
}

function guardarComentario() {
  var txt = document.getElementById('com-txt').value;
  localStorage.setItem('dash_notes_'+SESION.user+'_'+FECHA, txt);
  var sv = document.getElementById('com-saved');
  sv.style.display = 'block';
  setTimeout(function(){sv.style.display='none';}, 2500);
}

</script>
